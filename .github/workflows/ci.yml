name: CI

on:
    push:
        branches:
            - master
    pull_request:

permissions:
    contents: read

concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    lint:
        name: Lint
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: 22

            - name: Enable Corepack
              run: |
                  corepack enable
                  corepack prepare yarn@4.13.0 --activate

            - name: Install dependencies
              run: yarn --frozen-lockfile

            - name: Run lint
              run: yarn lint

    typecheck:
        name: Typecheck
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: 22

            - name: Enable Corepack
              run: |
                  corepack enable
                  corepack prepare yarn@4.13.0 --activate

            - name: Install dependencies
              run: yarn --frozen-lockfile

            - name: Build packages
              run: yarn build:packages

            - name: Run typecheck
              run: yarn typecheck

    test:
        name: Unit Test
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: 22

            - name: Enable Corepack
              run: |
                  corepack enable
                  corepack prepare yarn@4.13.0 --activate

            - name: Install dependencies
              run: yarn --frozen-lockfile

            - name: Build packages
              run: yarn build:packages

            - name: Run tests
              run: yarn test

    a11y:
        name: A11Y
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: 22

            - name: Enable Corepack
              run: |
                  corepack enable
                  corepack prepare yarn@4.13.0 --activate

            - name: Install dependencies
              run: yarn --frozen-lockfile

            - name: Build packages
              run: yarn build:packages

            - name: Run a11y tests
              run: yarn test:a11y

    coverage:
        name: Test Coverage
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: 22

            - name: Enable Corepack
              run: |
                  corepack enable
                  corepack prepare yarn@4.13.0 --activate

            - name: Install dependencies
              run: yarn --frozen-lockfile

            - name: Build packages
              run: yarn build:packages

            - name: Run coverage checks
              run: yarn test:coverage

    e2e:
        name: E2E Test
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: 22

            - name: Enable Corepack
              run: |
                  corepack enable
                  corepack prepare yarn@4.13.0 --activate

            - name: Install dependencies
              run: yarn --frozen-lockfile

            - name: Build packages
              run: yarn build:packages

            - name: Install Playwright Chromium
              run: yarn playwright install --with-deps chromium

            - name: Run E2E tests
              run: yarn test:e2e

    maintenance:
        name: Dependency Maintenance
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: 22

            - name: Enable Corepack
              run: |
                  corepack enable
                  corepack prepare yarn@4.13.0 --activate

            - name: Install dependencies
              run: yarn --frozen-lockfile

            - name: Check for deduplication opportunities
              run: yarn deps:dedupe-check

            - name: Check unused dependencies
              run: yarn deps:check

            - name: Audit dependencies
              run: yarn deps:audit

    deploy:
        name: Deploy to GitHub Pages
        runs-on: ubuntu-latest
        needs: [lint, typecheck, test, a11y, coverage, e2e]
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        permissions:
            pages: write
            id-token: write
            contents: read
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: 22

            - name: Enable Corepack
              run: |
                  corepack enable
                  corepack prepare yarn@4.13.0 --activate

            - name: Install dependencies
              run: yarn --frozen-lockfile

            - name: Build packages
              run: yarn build:packages

            - name: Build apps
              run: |
                  yarn build:portfolio
                  yarn build:title-case
                  yarn build:future-weight
                  yarn build:secret-santa

            - name: Assemble site
              run: |
                  mkdir -p _site
                  cp -r apps/portfolio/dist/. _site/
                  mkdir -p _site/title-case
                  cp -r apps/title-case/dist/. _site/title-case/
                  mkdir -p _site/future-weight
                  cp -r apps/future-weight/dist/. _site/future-weight/
                  mkdir -p _site/secret-santa
                  cp -r apps/secret-santa/dist/. _site/secret-santa/

            - name: Upload Pages artifact
              uses: actions/upload-pages-artifact@v5
              with:
                  path: _site

            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v5
