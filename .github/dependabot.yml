version: 2
updates:
    - package-ecosystem: npm
      directory: /
      schedule:
          interval: daily
      open-pull-requests-limit: 10
      labels:
          - dependencies
          - automated
      commit-message:
          prefix: 'deps'

    - package-ecosystem: github-actions
      directory: /
      schedule:
          interval: weekly
      open-pull-requests-limit: 3
      labels:
          - dependencies
          - github-actions
          - automated
      commit-message:
          prefix: 'ci'
